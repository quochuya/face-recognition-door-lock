spring.application.name=smartlock-server
# Cấu hình cổng chạy Server
server.port=8080


# === CẤU HÌNH KẾT NỐI MYSQL ===
spring.datasource.url=jdbc:mysql://localhost:3306/smartlockdb?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# === CẤU HÌNH HIBERNATE (TỰ ĐỘNG TẠO BẢNG) ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true